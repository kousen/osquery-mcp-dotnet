name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore OsqueryMcp.sln

      - name: Build
        run: dotnet build OsqueryMcp.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test OsqueryMcp.sln --configuration Release --no-build --filter "Category!=Integration"